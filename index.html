<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Groove Guitar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1>🎸 Groove Guitar</h1>

  <!-- METRONOMO -->
  <div class="card">
    <h2>Metrônomo</h2>

    <div class="bpm-controls">
      <button id="decrease">-</button>
      <span id="bpm">60</span>
      <button id="increase">+</button>
    </div>

    <div class="beats">
      <div class="dot" id="b0"></div>
      <div class="dot" id="b1"></div>
      <div class="dot" id="b2"></div>
      <div class="dot" id="b3"></div>
    </div>

    <button id="toggleMetronome">Iniciar</button>
  </div>

  <!-- NOTAS -->
  <div class="card">
    <h2>Notas Aleatórias</h2>

    <div id="note" class="note">C</div>

    <button id="generate">Gerar</button>
  </div>

  <!-- PLAYER -->
  <div class="card">
    <h2>Studio Player</h2>

    <input type="file" id="file" accept="audio/*">

    <button id="process">Separar Voz / Instrumental</button>

    <audio id="original" controls></audio>

    <h3>🎤 Voz</h3>
    <audio id="vocal" controls></audio>

    <h3>🎸 Instrumental</h3>
    <audio id="inst" controls></audio>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
